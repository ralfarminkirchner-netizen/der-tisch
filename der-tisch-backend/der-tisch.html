<style>
  /* ─── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #FAFAF8;
    --surface:     #FFFFFF;
    --surface-off: #F5F3EE;
    --text:        #1A1A1A;
    --muted:       #6B6B6B;
    --border:      #E8E4DC;
    --accent-1:    #E8614A;
    --accent-2:    #5B9E7A;
    --accent-3:    #8B7EC8;
    --accent-4:    #D4873A;
    --r-card:      16px;
    --r-btn:       12px;
    --r-input:     24px;
    --shadow-card: 0 2px 12px rgba(26,26,26,0.06), 0 1px 3px rgba(26,26,26,0.04);
    --transition:  0.2s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Nav ───────────────────────────────────────────────── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250, 250, 248, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    display: flex;
    flex-direction: column;
    line-height: 1;
    user-select: none;
    text-decoration: none;
    cursor: default;
  }

  .nav-logo-der {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    margin-bottom: 1px;
  }

  .nav-logo-tisch {
    display: flex;
    align-items: baseline;
    line-height: 1;
  }

  .nav-logo-T {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .nav-logo-i {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    font-style: normal;
    letter-spacing: -0.01em;
  }
  .nav-logo-sch {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  /* ─── Language Toggle ───────────────────────────────────── */
  .lang-toggle {
    display: flex;
    gap: 2px;
    background: var(--surface-off);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }

  .lang-btn {
    border: none;
    background: transparent;
    padding: 5px 12px;
    border-radius: 7px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
  }

  .lang-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 3px rgba(26,26,26,0.1);
  }

  .lang-btn:hover:not(.active) {
    color: var(--text);
  }

  /* ─── Tone Toggle ───────────────────────────────────── */
  .tone-toggle-dt {
    display: flex; gap: 2px;
    background: var(--surface-off);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }
  .tone-btn {
    border: none; background: transparent;
    padding: 5px 10px; border-radius: 7px;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--muted); cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }
  .tone-btn.active {
    background: var(--surface); color: var(--text);
    box-shadow: 0 1px 3px rgba(26,26,26,0.1);
  }
  .tone-btn:hover:not(.active) { color: var(--text); }

  /* ─── Main Content ──────────────────────────────────────── */
  main {
    flex: 1;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ─── Hero ──────────────────────────────────────────────── */
  .hero {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 0 40px;
    text-align: center;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232, 97, 74, 0.08);
    border: 1px solid rgba(232, 97, 74, 0.2);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-1);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .hero-eyebrow-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-1);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .hero h1 {
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 500;
    color: var(--text);
    line-height: 1.25;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .hero-sub {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 1.6;
  }

  /* ─── Input Area ─────────────────────────────────────────── */
  .input-wrapper {
    position: relative;
    margin-bottom: 16px;
  }

  .question-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--r-input);
    padding: 20px 24px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    background: var(--surface);
    resize: none;
    outline: none;
    min-height: 68px;
    max-height: 260px;
    overflow-y: auto;
    line-height: 1.6;
    box-shadow: var(--shadow-card);
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .question-input::placeholder {
    color: #B0ADA7;
  }

  .question-input:focus {
    border-color: var(--accent-1);
    box-shadow: 0 0 0 3px rgba(232, 97, 74, 0.1), var(--shadow-card);
  }

  /* ─── Example Chips ─────────────────────────────────────── */
  .chip-row {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .chip-row.visible { display: flex; }

  .chip {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 100px;
    padding: 7px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--accent-1);
    color: var(--accent-1);
    background: rgba(232, 97, 74, 0.04);
  }

  .chip:focus-visible {
    outline: 2px solid var(--accent-1);
    outline-offset: 2px;
  }

  /* ─── CTA Button ─────────────────────────────────────────── */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-1);
    color: #fff;
    border: none;
    border-radius: var(--r-btn);
    padding: 16px 32px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    box-shadow: 0 4px 16px rgba(232, 97, 74, 0.3);
    letter-spacing: -0.01em;
  }

  .cta-btn:hover:not(:disabled) {
    background: #D4523C;
    box-shadow: 0 6px 20px rgba(232, 97, 74, 0.4);
    transform: translateY(-1px);
  }

  .cta-btn:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(232, 97, 74, 0.3);
  }

  .cta-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }

  .cta-btn:focus-visible {
    outline: 2px solid var(--accent-1);
    outline-offset: 3px;
  }

  .cta-arrow {
    transition: transform var(--transition);
  }

  .cta-btn:hover:not(:disabled) .cta-arrow {
    transform: translateX(3px);
  }

  /* ─── Spinner ───────────────────────────────────────────── */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .cta-btn.loading .spinner { display: block; }
  .cta-btn.loading .btn-text { display: none; }
  .cta-btn.loading .cta-arrow { display: none; }

  /* ─── Error State ───────────────────────────────────────── */
  .error-msg {
    display: none;
    background: rgba(232, 97, 74, 0.06);
    border: 1px solid rgba(232, 97, 74, 0.25);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    color: #C0432C;
    margin-top: 16px;
    text-align: left;
    line-height: 1.5;
  }

  .error-msg.visible { display: block; }

  /* ─── Results Section ───────────────────────────────────── */
  .results-section {
    display: none;
    padding-bottom: 60px;
  }

  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 28px;
    padding-top: 12px;
  }

  .results-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .results-question-preview {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 400px;
  }

  /* ─── Skeleton Cards ────────────────────────────────────── */
  .skeleton-cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .skeleton-card {
    background: var(--surface);
    border-radius: var(--r-card);
    border: 1px solid var(--border);
    padding: 28px 28px 28px 36px;
    position: relative;
    overflow: hidden;
  }

  .skeleton-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: var(--border);
  }

  .skeleton-line {
    height: 14px;
    border-radius: 7px;
    background: linear-gradient(90deg, #E8E4DC 25%, #F0EDE7 50%, #E8E4DC 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    margin-bottom: 10px;
  }

  .skeleton-line:last-child { margin-bottom: 0; }
  .skeleton-line.short { width: 35%; height: 12px; margin-bottom: 16px; }
  .skeleton-line.long { width: 100%; }
  .skeleton-line.medium { width: 75%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ─── Perspective Cards ─────────────────────────────────── */
  .perspective-cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .perspective-card {
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: var(--r-card);
    padding: 28px 28px 28px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: transform var(--transition), box-shadow var(--transition);
    animation: card-in 0.4s ease both;
  }

  .perspective-card:nth-child(1) { animation-delay: 0.05s; }
  .perspective-card:nth-child(2) { animation-delay: 0.15s; }
  .perspective-card:nth-child(3) { animation-delay: 0.25s; }
  .perspective-card:nth-child(4) { animation-delay: 0.35s; }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .perspective-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(26,26,26,0.1);
  }

  /* Left accent stripe */
  .perspective-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: var(--card-accent);
    border-radius: var(--r-card) 0 0 var(--r-card);
  }

  .card-role-badge {
    display: inline-block;
    background: rgba(0,0,0,0.05);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 16px;
    /* accent color applied via JS */
  }

  .card-quote-mark {
    position: absolute;
    top: 12px;
    right: 20px;
    font-size: 80px;
    line-height: 1;
    font-family: Georgia, serif;
    color: var(--card-accent);
    opacity: 0.06;
    user-select: none;
    pointer-events: none;
  }

  .card-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
  }

  /* ─── Export Buttons ────────────────────────────────────── */
  .export-btns {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 11px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
  }

  .export-btn:hover {
    border-color: var(--text);
    color: var(--text);
    background: var(--surface-off);
  }

  .export-btn:focus-visible {
    outline: 2px solid var(--accent-1);
    outline-offset: 2px;
  }

  /* ─── Divider ───────────────────────────────────────────── */
  .section-divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-3));
    border-radius: 100px;
    margin: 0 auto 48px;
    border: none;
  }

  /* ─── Footer ────────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color var(--transition);
  }

  footer a:hover {
    color: var(--text);
  }

  /* ─── Responsive ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    main { padding: 0 16px; }

    .hero { padding: 48px 0 36px; }
    .hero h1 { font-size: 26px; }

    .chip { font-size: 12px; padding: 6px 13px; }

    .cta-btn { width: 100%; justify-content: center; }

    .perspective-card { padding: 22px 20px 22px 30px; }
    .card-text { font-size: 14px; }

    .export-btns { flex-direction: column; }
    .export-btn { justify-content: center; }

    .results-question-preview { display: none; }
  }

  /* ─── Print / PDF ─────────────────────────────────────────── */
  @media print {
    nav, .hero-input-section, .chip-row, .cta-btn, .export-btns, footer,
    .hero-eyebrow, .hero-sub, .section-divider, .results-header { display: none !important; }

    .hero h1 { display: block; font-size: 20px; margin-bottom: 8px; }

    .results-section { display: block !important; padding-bottom: 0; }

    .perspective-cards { gap: 12px; }
    .perspective-card { break-inside: avoid; margin-bottom: 1rem; box-shadow: none;
      border: 1px solid #ddd; page-break-inside: avoid; }

    .perspective-card:hover { transform: none; box-shadow: none; }

    body { background: #fff; }
  }

  /* Register switch */
  .register-row {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 24px;
  }
  .reg-btn {
    padding: 6px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface-off); color: var(--muted);
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .reg-btn.active {
    background: var(--accent-1); color: #fff;
    border-color: var(--accent-1);
    font-weight: 600;
  }
  .reg-btn:hover:not(.active) { border-color: var(--accent-1); color: var(--accent-1); }
  /* Translation */
  .dt-translate-wrap { margin-top: 32px; text-align: center; }
  .dt-translate-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--surface-off); color: var(--muted);
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .dt-translate-btn:hover { border-color: var(--accent-1); color: var(--accent-1); }
  .dt-translate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .dt-translated { margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--border); }
  .dt-translated-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    text-align: center; margin-bottom: 24px;
  }

  /* ═══════════════════════════════════════════════════════════
     MODULE: TTS PLAYER — DER TiSCH (light theme)
     Adapted from TEAM TiSCH v5.6. Accent: --accent-1 (#E8614A)
     ═══════════════════════════════════════════════════════════ */
  #dt-ttsBar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    z-index: 800;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(26,26,26,0.14), 0 2px 8px rgba(26,26,26,0.08);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
    min-width: 280px;
    max-width: 92vw;
  }
  #dt-ttsBar.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .dt-tts-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-off);
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dt-tts-btn:hover { border-color: var(--accent-1); color: var(--accent-1); background: rgba(232,97,74,0.08); }
  .dt-tts-btn.tts-active { background: var(--accent-1); color: #fff; border-color: var(--accent-1); }
  .dt-tts-btn svg { width: 13px; height: 13px; pointer-events: none; }
  .dt-tts-progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .dt-tts-label {
    font-size: 10px; color: var(--muted); letter-spacing: 0.05em;
    text-transform: uppercase; overflow: hidden; white-space: nowrap; max-width: 140px;
    font-family: inherit;
  }
  .dt-tts-progress {
    height: 3px; background: var(--border); border-radius: 9999px; overflow: hidden;
  }
  .dt-tts-progress-bar {
    height: 100%; background: var(--accent-1); border-radius: 9999px;
    width: 0%; transition: width 0.5s linear;
  }
  #dt-ttsClose {
    width: 22px; height: 22px; border-radius: 50%;
    border: none; background: transparent; color: var(--muted);
    font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; transition: color 0.15s;
  }
  #dt-ttsClose:hover { color: var(--text); }

  /* ═══════════════════════════════════════════════════════════
     MODULE: SESSION VERLAUF — DER TiSCH
     localStorage-basiert, max. 10 Sessions, modular erweiterbar

  // ─── Render perspective cards ───────────────────────────────
  
  // ─── Connection lines between perspective cards ──────────────────────────
  function drawDTConnections() {
    var cards = document.querySelectorAll('#perspective-cards .perspective-card');
    var svg = document.getElementById('dt-conn-svg');
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('id','dt-conn-svg');
      svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;pointer-events:none;overflow:visible;z-index:0;';
      var connEl = document.getElementById('dt-connections');
      if (connEl) connEl.appendChild(svg);
    }
    svg.innerHTML = '';
    if (cards.length < 2) return;

    var ACCENTS_CONN = ['#E8614A','#5B9E7A','#8B7EC8','#D4873A'];
    var rects = Array.from(cards).map(function(card) {
      var r = card.getBoundingClientRect();
      var pr = card.parentElement.getBoundingClientRect();
      return { x: r.left - pr.left + r.width/2, y: r.top - pr.top, h: r.height, card: card };
    });

    // Draw curved lines between adjacent cards (vertical list)
    for (var i = 0; i < rects.length - 1; i++) {
      var a = rects[i], b = rects[i+1];
      var x1 = a.x - 20, y1 = a.y + a.h - 10;
      var x2 = b.x - 20, y2 = b.y + 10;
      var mx = x1, my = (y1 + y2) / 2;
      var path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M '+x1+' '+y1+' C '+mx+' '+(my-20)+' '+mx+' '+(my+20)+' '+x2+' '+y2);
      path.setAttribute('stroke', ACCENTS_CONN[i % ACCENTS_CONN.length]);
      path.setAttribute('stroke-width','2');
      path.setAttribute('stroke-opacity','0.35');
      path.setAttribute('stroke-dasharray','5 6');
      path.setAttribute('fill','none');
      svg.appendChild(path);
    }
  }

  function renderResults(data) {
    var container = document.getElementById('perspective-cards');
    container.innerHTML = '';

    var perspectives = [];

    // Normalize response shape — support various API formats
    if (Array.isArray(data)) {
      perspectives = data;
    } else if (data && Array.isArray(data.perspectives)) {
      perspectives = data.perspectives;
    } else if (data && data.stimmen && Array.isArray(data.stimmen)) {
      perspectives = data.stimmen;
    } else if (data && data.responses && Array.isArray(data.responses)) {
      perspectives = data.responses;
    } else {
      // Fallback: wrap object values
      perspectives = Object.values(data || {}).filter(function (v) {
        return v && typeof v === 'object' && (v.role || v.name || v.text || v.content);
      });
    }

    // Limit to 4 perspectives
    perspectives = perspectives.slice(0, 4);

    if (perspectives.length === 0) {
      showError(i18n[currentLang].errorServer);
      document.getElementById('results-section').classList.remove('visible');
      return;
    }

    lastResults = perspectives;

    // SVG connection lines container — must live inside #perspective-cards
    // so that getBoundingClientRect offsets in drawDTConnections align
    var cardsEl = document.getElementById('perspective-cards');
    if (cardsEl) {
      cardsEl.style.position = 'relative';
      var old = document.getElementById('dt-connections');
      if (old) old.remove();
    }
    var connCanvas = document.createElement('div');
    connCanvas.id = 'dt-connections';
    connCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:0;';
    if (cardsEl) cardsEl.insertBefore(connCanvas, cardsEl.firstChild);

    perspectives.forEach(function (p, idx) {
      var accent = ACCENTS[idx % ACCENTS.length];

      // Normalize fields
      var role = p.role || p.name || p.perspective || p.stimme || ('Perspektive ' + (idx + 1));

      var card = document.createElement('div');

      card.style.setProperty('--card-accent', accent);

      roleLbl.style.color = accent;

      iconRow.appendChild(iconEl);
      iconRow.appendChild(roleLbl);
      card.appendChild(iconRow);

      var badge = document.createElement('div');
      badge.className = 'card-role-badge';
      badge.textContent = role;
      badge.style.background = hexToRgba(accent, 0.10);
      badge.style.color = accent;
      badge.style.display = 'none'; // replaced by iconRow above

      var quote = document.createElement('div');
      quote.className = 'card-quote-mark';
      quote.setAttribute('aria-hidden', 'true');
      quote.textContent = '\u201C';
      quote.style.color = accent;

      var textEl = document.createElement('p');
      textEl.className = 'card-text';
      textEl.textContent = text;

      card.appendChild(badge);
      card.appendChild(quote);
      card.appendChild(textEl);
      container.appendChild(card);
    });

    // Save to history
    try {
      historyAdd({
        question: lastQuestion || '',
        mode: currentLang === 'de' ? 'DER TiSCH' : 'THE TABLE',
        stil: 'alltag',
        perspectives: perspectives.map(function(p, i) {
          return { rolle: p.role || p.name || ('Perspektive ' + (i+1)) };
        }),
        fazit: ''
      });
    } catch(e) {}

    // Show export buttons
    document.getElementById('export-btns').style.display = 'flex';
    // Block 4 fix: robust timing — wait for layout paint, then verify cards have height
    (function waitForCards() {
      requestAnimationFrame(function() {
        var cards = document.querySelectorAll('#perspective-cards .perspective-card');
        var ready = cards.length > 1 && cards[0].getBoundingClientRect().height > 10;

    document.getElementById('dt-translated').style.display = 'none';

    // MODULE HOOKS — modular, erweiterbar

  // ─── Export: PDF (Block 2 — jsPDF via CDN) ──────────────────
  window.exportPDF = function () {
    if (!lastResults || lastResults.length === 0) return;
    // Load jsPDF on demand (CDN), then generate
    var btn = document.getElementById('export-pdf');
    var origText = btn ? btn.querySelector('span').textContent : '';
    if (btn) btn.querySelector('span').textContent = 'Wird erstellt…';

    function doGenerate() {
      try {
        var doc = new window.jspdf.jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
        var pageW = 210, margin = 18, contentW = pageW - margin * 2;
        var y = margin;

        // Header
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(107, 107, 107);
        doc.text('DER TiSCH — Mehrere Stimmen. Ein Tisch.', margin, y);
        doc.text(new Date().toLocaleDateString('de-DE'), pageW - margin, y, { align: 'right' });
        y += 6;
        doc.setDrawColor(232, 97, 74);
        doc.setLineWidth(0.5);
        doc.line(margin, y, pageW - margin, y);
        y += 10;

        // Question
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(15);
        doc.setTextColor(26, 26, 26);
        var qLines = doc.splitTextToSize(lastQuestion, contentW);
        doc.text(qLines, margin, y);
        y += qLines.length * 7 + 10;

        // Accent colors matching the app
        var accentRGB = [[232,97,74],[91,158,122],[139,126,200],[212,135,58]];

        // Perspective cards
        lastResults.forEach(function(p, idx) {
          var role = p.role || p.name || p.perspective || p.stimme || ('Perspektive ' + (idx+1));
          var text = p.text || p.content || p.antwort || p.response || '';
          var ac = accentRGB[idx % accentRGB.length];

          // Role badge background
          doc.setFillColor(ac[0], ac[1], ac[2]);
          doc.setDrawColor(ac[0], ac[1], ac[2]);
          doc.roundedRect(margin, y, contentW, 7, 2, 2, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.setTextColor(255,255,255);
          doc.text(role.toUpperCase(), margin + 4, y + 4.8);
          y += 10;

          // Left accent stripe
          doc.setFillColor(ac[0], ac[1], ac[2]);
          var textLines = doc.splitTextToSize(text, contentW - 8);
          var blockH = textLines.length * 5.2 + 6;
          doc.rect(margin, y, 2, blockH, 'F');

          // Card text
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);
          doc.setTextColor(40, 40, 40);
          doc.text(textLines, margin + 7, y + 5);
          y += blockH + 10;

          // Page break check
          if (y > 265 && idx < lastResults.length - 1) {
            doc.addPage();
            y = margin;
          }
        });

        // Footer
        y = Math.max(y, 275);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text('Erstellt mit DER TiSCH · der-tisch-production.up.railway.app', margin, 285);

        var filename = i18n[currentLang].exportFilename + '.pdf';
        doc.save(filename);
      } catch(e) {
        console.error('[DER TiSCH] PDF error:', e);
        window.print(); // Graceful fallback
      }
      if (btn) btn.querySelector('span').textContent = origText;
    }

    if (window.jspdf) {
      doGenerate();
    } else {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = doGenerate;
      s.onerror = function() { window.print(); if (btn) btn.querySelector('span').textContent = origText; };
      document.head.appendChild(s);
    }
  };

  // ─── Export: TXT ─────────────────────────────────────────────
  window.exportTXT = function () {
    if (!lastResults || lastResults.length === 0) return;

    var lines = [];
    var title = currentLang === 'de' ? 'DER TiSCH — Perspektiven' : 'DER TiSCH — Perspectives';
    lines.push(title);
    lines.push('='.repeat(title.length));
    lines.push('');
    lines.push((currentLang === 'de' ? 'Frage: ' : 'Question: ') + lastQuestion);
    lines.push('');
    lines.push('─'.repeat(50));
    lines.push('');

    lastResults.forEach(function (p, idx) {
      var role = p.role || p.name || p.perspective || p.stimme || ('Perspektive ' + (idx + 1));
      var text = p.text || p.content || p.antwort || p.response || '';
      lines.push('[' + role + ']');
      lines.push(text);
      lines.push('');
    });

    lines.push('─'.repeat(50));
    lines.push('Created with Perplexity Computer — https://www.perplexity.ai/computer');

    var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = i18n[currentLang].exportFilename + '.txt';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
  };

  // ─── Utility: hex to rgba ────────────────────────────────────
  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

})();

<script>

  function dtTtsGetText() {
    var container = document.getElementById('perspective-cards');
    if (!container) return '';
    var nodes = [];
    var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node) {
        var p = node.parentElement;
        if (!p) return NodeFilter.FILTER_REJECT;
        if (p.closest('.card-quote-mark, .card-role-badge, script, style')) return NodeFilter.FILTER_REJECT;
        var txt = node.textContent.trim();
        return txt.length > 3 ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    var node;
    while (node = walker.nextNode()) nodes.push(node.textContent.trim());
    return nodes.join(' ');
  }

  function dtTtsSplit(text) {
    var raw = text.match(/[^.!?]+[.!?]+/g) || [text];
    var chunks = [], cur = '';
    for (var i = 0; i < raw.length; i++) {
      var s = raw[i];
      if ((cur + s).length > 220 && cur.length > 0) { chunks.push(cur.trim()); cur = s; }
      else { cur += ' ' + s; }
    }
    if (cur.trim()) chunks.push(cur.trim());
    return chunks;
  }

  function dtTtsUpdateUI() {

    if (_tts.isPlaying) {
      playBtn.classList.add('tts-active');
      if (icon) icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      if (label) label.textContent = 'Liest vor…';
    } else {
      playBtn.classList.remove('tts-active');
      if (icon) icon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      if (label) label.textContent = 'Vorlesen';
    }
  }

  function dtTtsPlayChunk() {
    if (_tts.currentIdx >= _tts.sentences.length) { dtTtsStop(false); return; }
    var text = _tts.sentences[_tts.currentIdx];
    var utt = new SpeechSynthesisUtterance(text);
    // Use currentLang from outer scope if available
    utt.lang = (typeof currentLang !== 'undefined' && currentLang === 'en') ? 'en-GB' : 'de-DE';
    utt.rate = 0.95;
    utt.onend = function() {
      if (_tts.isPlaying) { _tts.currentIdx++; dtTtsPlayChunk(); }
    };
    utt.onboundary = function() {
      var pct = (_tts.currentIdx / Math.max(1, _tts.sentences.length)) * 100;
      var bar = document.getElementById('dt-ttsProgressBar');
      if (bar) bar.style.width = pct + '%';
    };
    _tts.utterance = utt;
    window.speechSynthesis.speak(utt);
  }

  window.dtTtsToggle = function() {
    if (!('speechSynthesis' in window)) {
      alert('Vorlesefunktion wird von diesem Browser nicht unterstützt.');
      return;
    }
    var bar = document.getElementById('dt-ttsBar');
    if (!bar) return;
    if (!bar.classList.contains('visible')) {
      var fullText = dtTtsGetText();
      if (!fullText) return;
      _tts.sentences = dtTtsSplit(fullText);
      _tts.currentIdx = 0;
      bar.classList.add('visible');
      _tts.isPlaying = true;
      window.speechSynthesis.cancel();
      dtTtsPlayChunk();
      dtTtsUpdateUI();
      return;
    }
    if (_tts.isPlaying) {
      window.speechSynthesis.pause();
      _tts.isPlaying = false;
    } else {
      _tts.isPlaying = true;
      if (window.speechSynthesis.paused) { window.speechSynthesis.resume(); }
      else { dtTtsPlayChunk(); }
    }
    dtTtsUpdateUI();
  };

  window.dtTtsSkip = function(seconds) {
    var delta = Math.max(1, Math.round(Math.abs(seconds) / 3));
    if (seconds < 0) { _tts.currentIdx = Math.max(0, _tts.currentIdx - delta); }
    else { _tts.currentIdx = Math.min(_tts.sentences.length - 1, _tts.currentIdx + delta); }
    if (_tts.isPlaying) { window.speechSynthesis.cancel(); dtTtsPlayChunk(); }
    dtTtsUpdateUI();
  };

  window.dtTtsStop = function(hide) {
    window.speechSynthesis.cancel();
    _tts.isPlaying = false;
    _tts.currentIdx = 0;
    var bar = document.getElementById('dt-ttsProgressBar');
    if (bar) bar.style.width = '0%';
    if (hide) {
      var tbar = document.getElementById('dt-ttsBar');
      if (tbar) tbar.classList.remove('visible');
    }
    dtTtsUpdateUI();
  };

  // Show TTS bar after results render (called from renderResults via event)
  window.dtTtsShowBar = function() {
    var bar = document.getElementById('dt-ttsBar');
    if (bar) { bar.classList.add('visible'); dtTtsStop(false); }
  };
})();
</script>


<!-- ═══════════════════════════════════════════════════════════
     MODULE: SESSION VERLAUF — DER TiSCH
     localStorage key: 'dt_sessions_v1'
     Format: [{q, ts, lang, perspectives:[{role,text}]}]
     Max: 10 einträge. Modular: andere Apps können gleiches
     Format verwenden mit anderem key (tt_sessions_v1, it_sessions_v1)
     ═══════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';
  var HIST_KEY = 'dt_sessions_v1';
  var HIST_MAX = 10;

  function dtHistLoad() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function dtHistSave(arr) {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(arr.slice(0, HIST_MAX))); } catch(e) {}
  }

  // Called from renderResults() after successful API response
  window.dtHistAddSession = function(question, lang, perspectives) {
    var arr = dtHistLoad();
    arr.unshift({
      q: question,
      ts: Date.now(),
      lang: lang,
      perspectives: (perspectives || []).slice(0, 4).map(function(p) {
        return { role: p.role || p.name || p.stimme || '', text: p.text || p.content || p.antwort || '' };
      })
    });
    dtHistSave(arr);
    dtHistUpdateCount();
  };

  window.dtHistToggle = function() {
    var panel = document.getElementById('dt-historyPanel');
    if (!panel) return;
    var isOpen = panel.classList.contains('open');
    if (isOpen) { panel.classList.remove('open'); return; }
    dtHistRender();
    panel.classList.add('open');
    // Close on outside click
    setTimeout(function() {
      document.addEventListener('click', dtHistOutside);
    }, 10);
  };

  function dtHistOutside(e) {
    var panel = document.getElementById('dt-historyPanel');
    var btn = document.getElementById('dt-histBtn');
    if (panel && !panel.contains(e.target) && !btn.contains(e.target)) {
      panel.classList.remove('open');
      document.removeEventListener('click', dtHistOutside);
    }
  }

  function dtHistRender() {
    var list = document.getElementById('dt-histList');
    if (!list) return;
    var arr = dtHistLoad();
    if (arr.length === 0) {
      list.innerHTML = '<div class="dt-hist-empty">Noch keine Sessions gespeichert.</div>';
      return;
    }
    list.innerHTML = '';
    arr.forEach(function(s, i) {
      var item = document.createElement('div');
      item.className = 'dt-hist-item';
      var d = new Date(s.ts);
      var dateStr = d.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      item.innerHTML =
        '<div class="dt-hist-item-q">' + escapeHtml(s.q) + '</div>' +
        '<div class="dt-hist-item-meta"><span>' + dateStr + '</span><span>' + (s.perspectives||[]).length + ' Stimmen</span></div>';
      item.addEventListener('click', function() { dtHistRestore(i); });
      list.appendChild(item);
    });
  }

  window.dtHistClear = function() {
    localStorage.removeItem(HIST_KEY);
    dtHistUpdateCount();
    dtHistRender();
  };

  window.dtHistRestore = function(idx) {
    var arr = dtHistLoad();
    var s = arr[idx];
    if (!s) return;
    // Close panel
    var panel = document.getElementById('dt-historyPanel');
    if (panel) panel.classList.remove('open');
    // Fill input
    var input = document.getElementById('question-input');
    if (input) { input.value = s.q; input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 260) + 'px'; }
    // Restore results directly (no new API call)
    if (typeof renderResultsDirect === 'function') {
      renderResultsDirect(s.q, s.perspectives);
    }
  };

  function dtHistUpdateCount() {
    var arr = dtHistLoad();
    var el = document.getElementById('dt-histCount');
    if (!el) return;
    if (arr.length > 0) { el.textContent = arr.length; el.classList.add('visible'); }
    else { el.classList.remove('visible'); }
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Init on load
  document.addEventListener('DOMContentLoaded', dtHistUpdateCount);
})();
</script>

// =============================================
// HISTORY (localStorage)
// =============================================
const HISTORY_KEY = 'tisch_history_v1';
const HISTORY_MAX = 50;

function historyLoad() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch(e) { return []; }
}
function historySave(arr) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, HISTORY_MAX))); }
  catch(e) {}
}
function historyAdd(entry) {
  const arr = historyLoad();
  arr.unshift({ ...entry, ts: Date.now() });
  historySave(arr);
  historyRenderList();
}
function historyDelete(ts) {
  const arr = historyLoad().filter(e => e.ts !== ts);
  historySave(arr);
  historyRenderList();
}
function historyClear() {
  historySave([]);
  historyRenderList();
}
function historyExport() {
  const arr = historyLoad();
  const blob = new Blob([JSON.stringify(arr, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'tisch-verlauf-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}
function historyToggle() {
  const panel = document.getElementById('historyPanel');
  const overlay = document.getElementById('historyOverlay');
  if (!panel) return;
  const open = panel.classList.toggle('open');
  overlay.classList.toggle('open', open);
  if (open) historyRenderList();
}
function historyFormatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'2-digit'})
    + ' ' + d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
}
function historyRenderList() {
  const list = document.getElementById('historyList');
  if (!list) return;
  const arr = historyLoad();
  if (!arr.length) {
    list.innerHTML = '<div class="history-empty">Noch keine gespeicherten Fragen.<br>Stelle eine Frage — sie wird hier erscheinen.</div>';
    return;
  }
  list.innerHTML = arr.map(e => {
    const chips = (e.perspectives || []).map(p =>
      `<span class="history-persp-chip">${p.rolle || ''}</span>`
    ).join('');
    const mode = e.mode ? `<span>${e.mode}</span>` : '';
    const stil = e.stil ? `<span>${e.stil}</span>` : '';
    return `
    <div class="history-item">
      <div class="history-item-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="history-item-meta">
          <div class="history-item-question">${e.question || ''}</div>
          <div class="history-item-info">
            <span>${historyFormatDate(e.ts)}</span>${mode}${stil}
          </div>
        </div>
        <button class="history-item-delete" onclick="event.stopPropagation();historyDelete(${e.ts})" aria-label="Löschen">×</button>
      </div>
      <div class="history-item-body">
        <div>${chips}</div>
        ${e.fazit ? `<p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-3);line-height:1.6">${e.fazit}</p>` : ''}
      </div>
    </div>`;
  }).join('');
}

</script>
