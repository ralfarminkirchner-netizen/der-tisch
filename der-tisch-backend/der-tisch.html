<style>
  /* ─── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #FAFAF8;
    --surface:     #FFFFFF;
    --surface-off: #F5F3EE;
    --text:        #1A1A1A;
    --muted:       #6B6B6B;
    --border:      #E8E4DC;
    --accent-1:    #E8614A;
    --accent-2:    #5B9E7A;
    --accent-3:    #8B7EC8;
    --accent-4:    #D4873A;
    --r-card:      16px;
    --r-btn:       12px;
    --r-input:     24px;
    --shadow-card: 0 2px 12px rgba(26,26,26,0.06), 0 1px 3px rgba(26,26,26,0.04);
    --transition:  0.2s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Nav ───────────────────────────────────────────────── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250, 250, 248, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    display: flex;
    flex-direction: column;
    line-height: 1;
    user-select: none;
    text-decoration: none;
    cursor: default;
  }

  .nav-logo-der {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    margin-bottom: 1px;
  }

  .nav-logo-tisch {
    display: flex;
    align-items: baseline;
    line-height: 1;
  }

  .nav-logo-T {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .nav-logo-isch {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  /* ─── Language Toggle ───────────────────────────────────── */
  .lang-toggle {
    display: flex;
    gap: 2px;
    background: var(--surface-off);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
  }

  .lang-btn {
    border: none;
    background: transparent;
    padding: 5px 12px;
    border-radius: 7px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
  }

  .lang-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 3px rgba(26,26,26,0.1);
  }

  .lang-btn:hover:not(.active) {
    color: var(--text);
  }

  /* ─── Main Content ──────────────────────────────────────── */
  main {
    flex: 1;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ─── Hero ──────────────────────────────────────────────── */
  .hero {
    padding: 72px 0 48px;
    text-align: center;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232, 97, 74, 0.08);
    border: 1px solid rgba(232, 97, 74, 0.2);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-1);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .hero-eyebrow-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-1);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .hero h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .hero-sub {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 1.6;
  }

  /* ─── Input Area ─────────────────────────────────────────── */
  .input-wrapper {
    position: relative;
    margin-bottom: 16px;
  }

  .question-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--r-input);
    padding: 20px 24px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    background: var(--surface);
    resize: none;
    outline: none;
    min-height: 80px;
    max-height: 200px;
    line-height: 1.6;
    box-shadow: var(--shadow-card);
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .question-input::placeholder {
    color: #B0ADA7;
  }

  .question-input:focus {
    border-color: var(--accent-1);
    box-shadow: 0 0 0 3px rgba(232, 97, 74, 0.1), var(--shadow-card);
  }

  /* ─── Example Chips ─────────────────────────────────────── */
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .chip {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 100px;
    padding: 7px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--accent-1);
    color: var(--accent-1);
    background: rgba(232, 97, 74, 0.04);
  }

  .chip:focus-visible {
    outline: 2px solid var(--accent-1);
    outline-offset: 2px;
  }

  /* ─── CTA Button ─────────────────────────────────────────── */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-1);
    color: #fff;
    border: none;
    border-radius: var(--r-btn);
    padding: 16px 32px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    box-shadow: 0 4px 16px rgba(232, 97, 74, 0.3);
    letter-spacing: -0.01em;
  }

  .cta-btn:hover:not(:disabled) {
    background: #D4523C;
    box-shadow: 0 6px 20px rgba(232, 97, 74, 0.4);
    transform: translateY(-1px);
  }

  .cta-btn:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(232, 97, 74, 0.3);
  }

  .cta-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }

  .cta-btn:focus-visible {
    outline: 2px solid var(--accent-1);
    outline-offset: 3px;
  }

  .cta-arrow {
    transition: transform var(--transition);
  }

  .cta-btn:hover:not(:disabled) .cta-arrow {
    transform: translateX(3px);
  }

  /* ─── Spinner ───────────────────────────────────────────── */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .cta-btn.loading .spinner { display: block; }
  .cta-btn.loading .btn-text { display: none; }
  .cta-btn.loading .cta-arrow { display: none; }

  /* ─── Error State ───────────────────────────────────────── */
  .error-msg {
    display: none;
    background: rgba(232, 97, 74, 0.06);
    border: 1px solid rgba(232, 97, 74, 0.25);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    color: #C0432C;
    margin-top: 16px;
    text-align: left;
    line-height: 1.5;
  }

  .error-msg.visible { display: block; }

  /* ─── Results Section ───────────────────────────────────── */
  .results-section {
    display: none;
    padding-bottom: 60px;
  }

  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 28px;
    padding-top: 12px;
  }

  .results-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .results-question-preview {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 400px;
  }

  /* ─── Skeleton Cards ────────────────────────────────────── */
  .skeleton-cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .skeleton-card {
    background: var(--surface);
    border-radius: var(--r-card);
    border: 1px solid var(--border);
    padding: 28px 28px 28px 36px;
    position: relative;
    overflow: hidden;
  }

  .skeleton-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: var(--border);
  }

  .skeleton-line {
    height: 14px;
    border-radius: 7px;
    background: linear-gradient(90deg, #E8E4DC 25%, #F0EDE7 50%, #E8E4DC 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    margin-bottom: 10px;
  }

  .skeleton-line:last-child { margin-bottom: 0; }
  .skeleton-line.short { width: 35%; height: 12px; margin-bottom: 16px; }
  .skeleton-line.long { width: 100%; }
  .skeleton-line.medium { width: 75%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ─── Perspective Cards ─────────────────────────────────── */
  .perspective-cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .perspective-card {
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: var(--r-card);
    padding: 28px 28px 28px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: transform var(--transition), box-shadow var(--transition);
    animation: card-in 0.4s ease both;
  }

  .perspective-card:nth-child(1) { animation-delay: 0.05s; }
  .perspective-card:nth-child(2) { animation-delay: 0.15s; }
  .perspective-card:nth-child(3) { animation-delay: 0.25s; }
  .perspective-card:nth-child(4) { animation-delay: 0.35s; }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .perspective-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(26,26,26,0.1);
  }

  /* Left accent stripe */
  .perspective-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: var(--card-accent);
    border-radius: var(--r-card) 0 0 var(--r-card);
  }

  .card-role-badge {
    display: inline-block;
    background: rgba(0,0,0,0.05);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 16px;
    /* accent color applied via JS */
  }

  .card-quote-mark {
    position: absolute;
    top: 12px;
    right: 20px;
    font-size: 80px;
    line-height: 1;
    font-family: Georgia, serif;
    color: var(--card-accent);
    opacity: 0.06;
    user-select: none;
    pointer-events: none;
  }

  .card-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
  }

  /* ─── Export Buttons ────────────────────────────────────── */
  .export-btns {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 11px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all var(--transition);
  }

  .export-btn:hover {
    border-color: var(--text);
    color: var(--text);
    background: var(--surface-off);
  }

  .export-btn:focus-visible {
    outline: 2px solid var(--accent-1);
    outline-offset: 2px;
  }

  /* ─── Divider ───────────────────────────────────────────── */
  .section-divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-3));
    border-radius: 100px;
    margin: 0 auto 48px;
    border: none;
  }

  /* ─── Footer ────────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color var(--transition);
  }

  footer a:hover {
    color: var(--text);
  }

  /* ─── Responsive ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    main { padding: 0 16px; }

    .hero { padding: 48px 0 36px; }
    .hero h1 { font-size: 26px; }

    .chip { font-size: 12px; padding: 6px 13px; }

    .cta-btn { width: 100%; justify-content: center; }

    .perspective-card { padding: 22px 20px 22px 30px; }
    .card-text { font-size: 14px; }

    .export-btns { flex-direction: column; }
    .export-btn { justify-content: center; }

    .results-question-preview { display: none; }
  }

  /* ─── Print / PDF ─────────────────────────────────────────── */
  @media print {
    nav, .hero-input-section, .chip-row, .cta-btn, .export-btns, footer,
    .hero-eyebrow, .hero-sub, .section-divider, .results-header { display: none !important; }

    .hero h1 { display: block; font-size: 20px; margin-bottom: 8px; }

    .results-section { display: block !important; padding-bottom: 0; }

    .perspective-cards { gap: 12px; }
    .perspective-card { break-inside: avoid; margin-bottom: 1rem; box-shadow: none;
      border: 1px solid #ddd; page-break-inside: avoid; }

    .perspective-card:hover { transform: none; box-shadow: none; }

    body { background: #fff; }
  }
</style>
</head>
<body>

<!-- ─── Navigation ──────────────────────────────────────────── -->
<nav>
  <div class="nav-logo" aria-label="DER TiSCH">
    <span class="nav-logo-der">DER</span>
    <span class="nav-logo-tisch">
      <span class="nav-logo-T">T</span><span class="nav-logo-isch">iSCH</span>
    </span>
  </div>

  <div class="lang-toggle" role="group" aria-label="Sprache wählen">
    <button class="lang-btn active" id="btn-de" onclick="setLang('de')" aria-pressed="true">DE</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')" aria-pressed="false">EN</button>
  </div>
</nav>

<!-- ─── Main ─────────────────────────────────────────────────── -->
<main>

  <!-- Hero -->
  <section class="hero" aria-labelledby="hero-heading">
    <div class="hero-eyebrow">
      <span class="hero-eyebrow-dot" aria-hidden="true"></span>
      <span id="eyebrow-text">KI-Multiperspektive</span>
    </div>

    <h1 id="hero-heading" data-de="Was denkst du — und was übersehen wir?" data-en="What do you think — and what are we missing?">
      Was denkst du — und was übersehen wir?
    </h1>

    <p class="hero-sub" id="hero-sub" data-de="Stell eine Frage. Mehrere Stimmen antworten." data-en="Different voices. One table.">
      Stell eine Frage. Mehrere Stimmen antworten.
    </p>

    <!-- Input -->
    <div class="hero-input-section">
      <div class="input-wrapper">
        <label for="question-input" class="sr-only" id="input-label">Deine Frage oder Thema</label>
        <textarea
          id="question-input"
          class="question-input"
          rows="2"
          placeholder="Deine Frage oder Thema …"
          aria-label="Deine Frage oder Thema"
          aria-describedby="input-help"
          maxlength="1000"
        ></textarea>
      </div>

      <div class="chip-row" id="chip-row" role="list" aria-label="Beispielfragen">
        <button class="chip" role="listitem" onclick="fillChip(this)">Sollte ich kündigen?</button>
        <button class="chip" role="listitem" onclick="fillChip(this)">KI im Unterricht — Fluch oder Segen?</button>
        <button class="chip" role="listitem" onclick="fillChip(this)">Streit mit einem engen Freund</button>
        <button class="chip" role="listitem" onclick="fillChip(this)">Klimawandel — was kann ich tun?</button>
        <button class="chip" role="listitem" onclick="fillChip(this)">Zwischen zwei Entscheidungen</button>
      </div>

      <button class="cta-btn" id="cta-btn" onclick="askQuestion()" aria-label="Am Tisch Platz nehmen">
        <span class="spinner" aria-hidden="true"></span>
        <span class="btn-text" id="cta-text" data-de="Am Tisch Platz nehmen" data-en="Take a seat at the table">Am Tisch Platz nehmen</span>
        <span class="cta-arrow" aria-hidden="true">→</span>
      </button>

      <div class="error-msg" id="error-msg" role="alert" aria-live="polite"></div>
    </div>
  </section>

  <hr class="section-divider" aria-hidden="true">

  <!-- Results -->
  <section class="results-section" id="results-section" aria-label="Perspektiven am Tisch" aria-live="polite">
    <div class="results-header">
      <span class="results-label" id="results-label" data-de="Am Tisch:" data-en="At the table:">Am Tisch:</span>
      <span class="results-question-preview" id="results-question-preview"></span>
    </div>

    <!-- Skeleton loading state -->
    <div class="skeleton-cards" id="skeleton-cards" aria-hidden="true">
      <div class="skeleton-card">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line long"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line medium"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line long"></div>
      </div>
    </div>

    <!-- Actual perspective cards -->
    <div class="perspective-cards" id="perspective-cards"></div>

    <!-- Export buttons -->
    <div class="export-btns" id="export-btns" style="display:none;">
      <button class="export-btn" id="export-pdf" onclick="exportPDF()" aria-label="Als PDF exportieren">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 12v1.5a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5V12M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="pdf-btn-text" data-de="PDF exportieren" data-en="Export PDF">PDF exportieren</span>
      </button>

      <button class="export-btn" id="export-txt" onclick="exportTXT()" aria-label="Als TXT exportieren">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 12v1.5a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5V12M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="txt-btn-text" data-de="TXT exportieren" data-en="Export TXT">TXT exportieren</span>
      </button>
    </div>
  </section>

</main>

<!-- ─── Footer ──────────────────────────────────────────────── -->
<footer>
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>

<!-- ─── Screen Reader Utility ──────────────────────────────── -->
<style>
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
  }
</style>

<!-- ─── JavaScript ──────────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  // ─── Constants ─────────────────────────────────────────────
  const API = '';
  const ACCENTS = ['#E8614A', '#5B9E7A', '#8B7EC8', '#D4873A'];
  let currentLang = 'de';
  let lastResults = null;
  let lastQuestion = '';

  // ─── i18n strings ──────────────────────────────────────────
  const i18n = {
    de: {
      placeholder: 'Deine Frage oder Thema …',
      eyebrow: 'KI-Multiperspektive',
      errorEmpty: 'Bitte gib eine Frage oder ein Thema ein.',
      errorNetwork: 'Verbindungsfehler. Bitte überprüfe deine Internetverbindung.',
      errorServer: 'Serverfehler. Bitte versuch es in einem Moment noch einmal.',
      chips: [
        'Sollte ich kündigen?',
        'KI im Unterricht — Fluch oder Segen?',
        'Streit mit einem engen Freund',
        'Klimawandel — was kann ich tun?',
        'Zwischen zwei Entscheidungen'
      ],
      exportFilename: 'der-tisch-perspektiven'
    },
    en: {
      placeholder: 'Your question or topic …',
      eyebrow: 'AI Multi-Perspective',
      errorEmpty: 'Please enter a question or topic.',
      errorNetwork: 'Connection error. Please check your internet connection.',
      errorServer: 'Server error. Please try again in a moment.',
      chips: [
        'Should I quit my job?',
        'AI in education — blessing or curse?',
        'Conflict with a close friend',
        'Climate change — what can I do?',
        'Stuck between two decisions'
      ],
      exportFilename: 'der-tisch-perspectives'
    }
  };

  // ─── Language Toggle ────────────────────────────────────────
  window.setLang = function (lang) {
    currentLang = lang;

    // Update active button
    document.getElementById('btn-de').classList.toggle('active', lang === 'de');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-de').setAttribute('aria-pressed', String(lang === 'de'));
    document.getElementById('btn-en').setAttribute('aria-pressed', String(lang === 'en'));

    // Update html lang
    document.documentElement.setAttribute('lang', lang);

    // Update all data-de/data-en elements
    document.querySelectorAll('[data-de][data-en]').forEach(function (el) {
      el.textContent = el.getAttribute('data-' + lang);
    });

    // Update placeholder
    document.getElementById('question-input').placeholder = i18n[lang].placeholder;

    // Update eyebrow
    document.getElementById('eyebrow-text').textContent = i18n[lang].eyebrow;

    // Update chips
    var chipBtns = document.querySelectorAll('#chip-row .chip');
    var chips = i18n[lang].chips;
    chipBtns.forEach(function (btn, idx) {
      if (chips[idx]) btn.textContent = chips[idx];
    });
  };

  // ─── Chip fill ──────────────────────────────────────────────
  window.fillChip = function (el) {
    var input = document.getElementById('question-input');
    input.value = el.textContent;
    input.focus();
    autoResize(input);
    hideError();
  };

  // ─── Auto-resize textarea ───────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  document.getElementById('question-input').addEventListener('input', function () {
    autoResize(this);
    hideError();
  });

  // ─── Keyboard submit ────────────────────────────────────────
  document.getElementById('question-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      askQuestion();
    }
  });

  // ─── Error helpers ──────────────────────────────────────────
  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  // ─── Loading state helpers ───────────────────────────────────
  function setLoading(loading) {
    var btn = document.getElementById('cta-btn');
    btn.disabled = loading;
    btn.classList.toggle('loading', loading);
  }

  function showSkeleton() {
    var section = document.getElementById('results-section');
    section.classList.add('visible');
    document.getElementById('skeleton-cards').style.display = 'flex';
    document.getElementById('perspective-cards').innerHTML = '';
    document.getElementById('export-btns').style.display = 'none';
    // Scroll to results
    setTimeout(function () {
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  function hideSkeleton() {
    document.getElementById('skeleton-cards').style.display = 'none';
  }

  // ─── Main ask function ──────────────────────────────────────
  window.askQuestion = function () {
    var input = document.getElementById('question-input');
    var question = input.value.trim();

    if (!question) {
      showError(i18n[currentLang].errorEmpty);
      input.focus();
      return;
    }

    hideError();
    lastQuestion = question;

    // Update results header preview
    var preview = document.getElementById('results-question-preview');
    preview.textContent = '\u201E' + question + '\u201C';

    setLoading(true);
    showSkeleton();

    var payload = {
      question: question,
      lang: currentLang,
      stil: 'alltag',
      custom_perspectives: []
    };

    fetch(API + '/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(function (res) {
        if (!res.ok) {
          return res.text().then(function (t) {
            throw new Error('SERVER:' + res.status + ':' + t);
          });
        }
        return res.json();
      })
      .then(function (data) {
        setLoading(false);
        hideSkeleton();
        renderResults(data);
      })
      .catch(function (err) {
        setLoading(false);
        hideSkeleton();
        document.getElementById('results-section').classList.remove('visible');

        if (err && err.message && err.message.startsWith('SERVER:')) {
          showError(i18n[currentLang].errorServer);
        } else {
          showError(i18n[currentLang].errorNetwork);
        }

        console.error('[DER TiSCH] API error:', err);
      });
  };

  // ─── Render perspective cards ───────────────────────────────
  function renderResults(data) {
    var container = document.getElementById('perspective-cards');
    container.innerHTML = '';

    var perspectives = [];

    // Normalize response shape — support various API formats
    if (Array.isArray(data)) {
      perspectives = data;
    } else if (data && Array.isArray(data.perspectives)) {
      perspectives = data.perspectives;
    } else if (data && data.stimmen && Array.isArray(data.stimmen)) {
      perspectives = data.stimmen;
    } else if (data && data.responses && Array.isArray(data.responses)) {
      perspectives = data.responses;
    } else {
      // Fallback: wrap object values
      perspectives = Object.values(data || {}).filter(function (v) {
        return v && typeof v === 'object' && (v.role || v.name || v.text || v.content);
      });
    }

    // Limit to 4 perspectives
    perspectives = perspectives.slice(0, 4);

    if (perspectives.length === 0) {
      showError(i18n[currentLang].errorServer);
      document.getElementById('results-section').classList.remove('visible');
      return;
    }

    lastResults = perspectives;

    perspectives.forEach(function (p, idx) {
      var accent = ACCENTS[idx % ACCENTS.length];

      // Normalize fields
      var role = p.role || p.name || p.perspective || p.stimme || ('Perspektive ' + (idx + 1));
      var text = p.text || p.content || p.antwort || p.response || '';

      var card = document.createElement('div');
      card.className = 'perspective-card';
      card.style.setProperty('--card-accent', accent);

      var badge = document.createElement('div');
      badge.className = 'card-role-badge';
      badge.textContent = role;
      badge.style.background = hexToRgba(accent, 0.10);
      badge.style.color = accent;

      var quote = document.createElement('div');
      quote.className = 'card-quote-mark';
      quote.setAttribute('aria-hidden', 'true');
      quote.textContent = '\u201C';
      quote.style.color = accent;

      var textEl = document.createElement('p');
      textEl.className = 'card-text';
      textEl.textContent = text;

      card.appendChild(badge);
      card.appendChild(quote);
      card.appendChild(textEl);
      container.appendChild(card);
    });

    // Show export buttons
    document.getElementById('export-btns').style.display = 'flex';
  }

  // ─── Export: PDF ─────────────────────────────────────────────
  window.exportPDF = function () {
    window.print();
  };

  // ─── Export: TXT ─────────────────────────────────────────────
  window.exportTXT = function () {
    if (!lastResults || lastResults.length === 0) return;

    var lines = [];
    var title = currentLang === 'de' ? 'DER TiSCH — Perspektiven' : 'DER TiSCH — Perspectives';
    lines.push(title);
    lines.push('='.repeat(title.length));
    lines.push('');
    lines.push((currentLang === 'de' ? 'Frage: ' : 'Question: ') + lastQuestion);
    lines.push('');
    lines.push('─'.repeat(50));
    lines.push('');

    lastResults.forEach(function (p, idx) {
      var role = p.role || p.name || p.perspective || p.stimme || ('Perspektive ' + (idx + 1));
      var text = p.text || p.content || p.antwort || p.response || '';
      lines.push('[' + role + ']');
      lines.push(text);
      lines.push('');
    });

    lines.push('─'.repeat(50));
    lines.push('Created with Perplexity Computer — https://www.perplexity.ai/computer');

    var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = i18n[currentLang].exportFilename + '.txt';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
  };

  // ─── Utility: hex to rgba ────────────────────────────────────
  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

})();
</script>

</body>
</html>
